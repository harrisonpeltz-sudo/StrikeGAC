    const idCache = {};
    const conferences = {
      cun: ["pat", "hend", "ston", "d", "zuck"],
      fel: ["Gib", "caleb", "har", "krev", "AI"]
    };

    async function lookupPlayerIdByName(name) {
      if (idCache[name]) return idCache[name];

      const url = `https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}`;
      const response = await fetch(url);
      const text = await response.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        return null;
      }

      const id = data.people?.[0]?.id ?? null;
      idCache[name] = id;
      return id;
    }

    async function getHR(player) {
      let playerId = player.id;

      if (!playerId) {
        playerId = await lookupPlayerIdByName(player.name);
      }

      if (!playerId) return null;

      const url = `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting`;
      const response = await fetch(url);
      const text = await response.text();

      let data;
      try {
        data = JSON.parse(text);
      } catch {
        return null;
      }

      if (data.stats?.[0]?.splits?.[0]?.stat?.homeRuns !== undefined) {
        return data.stats[0].splits[0].stat.homeRuns;
      }

      return 0;
    }
    function getTodayInNewYork() {
      const parts = new Intl.DateTimeFormat("en-US", {
        timeZone: "America/New_York",
        year: "numeric",
        month: "2-digit",
        day: "2-digit"
      }).formatToParts(new Date());

      const year = parts.find(p => p.type === "year").value;
      const month = parts.find(p => p.type === "month").value;
      const day = parts.find(p => p.type === "day").value;

      return `${year}-${month}-${day}`;
    }

    let todayScheduleCache = null;
    let teamMatchupCache = null;

    async function getTodayScheduleMap() {
      if (teamMatchupCache) return teamMatchupCache;

      const todayNY = getTodayInNewYork();
      const response = await fetch(
        `https://statsapi.mlb.com/api/v1/schedule?sportId=1&date=${todayNY}`
      );
      const data = await response.json();

      todayScheduleCache = data;
      teamMatchupCache = {};

      const games = data.dates?.[0]?.games || [];

      games.forEach((game) => {
        const homeTeam = game.teams?.home?.team;
        const awayTeam = game.teams?.away?.team;
        const status = game.status?.detailedState || "Scheduled";
        const gameDateUTC = game.gameDate;

        const gameTimeET = gameDateUTC
          ? new Date(gameDateUTC).toLocaleTimeString("en-US", {
            timeZone: "America/New_York",
            hour: "numeric",
            minute: "2-digit"
          })
          : "";

        if (homeTeam?.id && awayTeam?.id) {
          teamMatchupCache[homeTeam.id] = `vs ${awayTeam.abbreviation || awayTeam.name} — ${gameTimeET} ET (${status})`;
          teamMatchupCache[awayTeam.id] = `@ ${homeTeam.abbreviation || homeTeam.name} — ${gameTimeET} ET (${status})`;
        }
      });

      return teamMatchupCache;
    }

    async function getTodayInfo(player) {
      let playerId = player.id;

      if (!playerId) {
        playerId = await lookupPlayerIdByName(player.name);
      }

      if (!playerId) {
        return {
          todayHR: null,
          matchup: "N/A"
        };
      }

      let teamId = null;

      try {
        const playerResponse = await fetch(`https://statsapi.mlb.com/api/v1/people/${playerId}?hydrate=currentTeam`); const playerData = await playerResponse.json();
        teamId = playerData.people?.[0]?.currentTeam?.id ?? null;
      } catch {
        teamId = null;
      }

      let matchup = "Off";
      let todayHR = 0;

      try {
        const matchupMap = await getTodayScheduleMap();
        if (teamId && matchupMap[teamId]) {
          matchup = matchupMap[teamId];
        }
      } catch {
        matchup = "Off";
      }

      try {
        const todayNY = getTodayInNewYork();
        const statsResponse = await fetch(
          `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=gameLog&group=hitting&season=2026`
        );
        const statsData = await statsResponse.json();

        const splits = statsData.stats?.[0]?.splits || [];
        const todaysGames = splits.filter(split => split.date === todayNY);

        todayHR = todaysGames.reduce((sum, split) => {
          return sum + (split.stat?.homeRuns || 0);
        }, 0);
      } catch {
        todayHR = null;
      }

      return { todayHR, matchup };
    }
    async function showTeam(teamName) {
      const display = document.getElementById("teamDisplay");
      const players = teams[teamName];

      display.innerHTML = `<h2>${teamName}</h2><p>Loading...</p>`;

      const results = await Promise.all(
        players.map(async (player) => {
          const seasonHR = await getHR(player);
          const todayInfo = await getTodayInfo(player);

          return {
            ...player,
            seasonHR,
            todayHR: todayInfo.todayHR,
            matchup: todayInfo.matchup
          };
        })
      );

      const totalHR = results.reduce(
        (sum, p) => sum + (typeof p.seasonHR === "number" ? p.seasonHR : 0),
        0
      );

      let html = `
    <h2>${teamName}</h2>
    <p><strong>Total Season HR:</strong> ${totalHR}</p>
    <table style="border-collapse: collapse; min-width: 900px;">
      <thead>
        <tr>
          <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Pos</th>
          <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Player</th>
          <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Matchup</th>
          <th style="text-align:right; padding:8px 12px; border-bottom:2px solid #ccc;">HR Today</th>
          <th style="text-align:right; padding:8px 12px; border-bottom:2px solid #ccc;">Season HR</th>
        </tr>
      </thead>
      <tbody>
  `;

      results.forEach((p) => {
        html += `
      <tr>
        <td style="padding:8px 12px; border-bottom:1px solid #eee;">${p.position}</td>
        <td style="padding:8px 12px; border-bottom:1px solid #eee;">${p.name}</td>
        <td style="padding:8px 12px; border-bottom:1px solid #eee;">${p.matchup}</td>
        <td style="text-align:right; padding:8px 12px; border-bottom:1px solid #eee;">${p.todayHR === null ? "N/A" : p.todayHR}</td>
        <td style="text-align:right; padding:8px 12px; border-bottom:1px solid #eee;">${p.seasonHR === null ? "N/A" : p.seasonHR}</td>
      </tr>
    `;
      });

      html += `
      </tbody>
    </table>
  `;

      display.innerHTML = html;
      updateTimestamp();
    }
    async function showLeagueTable() {
      const display = document.getElementById("leagueTableDisplay");
      display.innerHTML = "<h2>League Comparison</h2><p>Loading...</p>";

      const teamNames = Object.keys(teams);

      // Fetch all data
      const teamResults = {};

      for (const teamName of teamNames) {
        const players = teams[teamName];

        const results = await Promise.all(
          players.map(async (player) => {
            const hr = await getHR(player);
            return { ...player, hr };
          })
        );

        teamResults[teamName] = results;
      }

      // Build table
      let html = `
    <h2>League Comparison</h2>
    <table style="border-collapse: collapse; font-size: 12px;">
      <thead>
        <tr>
          ${teamNames.map(team => `
            <th colspan="3" style="border-bottom:2px solid #000; padding:6px 10px;">
              ${team}
            </th>
          `).join("")}
        </tr>
        <tr>
          ${teamNames.map(() => `
            <th style="padding:4px 8px;">Pos</th>
            <th style="padding:4px 8px;">Player</th>
            <th style="padding:4px 8px;">HR</th>
          `).join("")}
        </tr>
      </thead>
      <tbody>
  `;

      // 9 rows (one per position)
      for (let i = 0; i < 9; i++) {
        html += "<tr>";

        for (const team of teamNames) {
          const p = teamResults[team][i];

          html += `
        <td style="padding:4px 8px; border-top:1px solid #eee;">${p.position}</td>
        <td style="padding:4px 8px; border-top:1px solid #eee;">${p.name}</td>
        <td style="padding:4px 8px; border-top:1px solid #eee; text-align:right;">
          ${p.hr === null ? "N/A" : p.hr}
        </td>
      `;
        }

        html += "</tr>";
      }

      // totals row
      html += "<tr>";

      for (const team of teamNames) {
        const total = teamResults[team].reduce(
          (sum, p) => sum + (typeof p.hr === "number" ? p.hr : 0),
          0
        );

        html += `
      <td colspan="2" style="padding:6px 8px; border-top:2px solid #000;"><strong>Total</strong></td>
      <td style="padding:6px 8px; border-top:2px solid #000; text-align:right;">
        <strong>${total}</strong>
      </td>
    `;
      }

      html += `
      </tr>
      </tbody>
    </table>
  `;

      display.innerHTML = html;
    }
    async function showStandings() {
      const display = document.getElementById("standingsDisplay");
      display.innerHTML = "<h2>Standings</h2><p>Loading standings...</p>";

      try {
        const standings = await Promise.all(
          Object.entries(teams).map(async ([teamName, players]) => {
            const hrs = await Promise.all(
              players.map(async (player) => {
                const hr = await getHR(player);
                return typeof hr === "number" ? hr : 0;
              })
            );

            return {
              teamName,
              totalHR: hrs.reduce((sum, hr) => sum + hr, 0)
            };
          })
        );

        standings.sort((a, b) => b.totalHR - a.totalHR);

        const cunStandings = standings.filter(team =>
          conferences.cun.includes(team.teamName)
        );
        const felStandings = standings.filter(team =>
          conferences.fel.includes(team.teamName)
        );

        const overallTotal = standings.reduce((sum, team) => sum + team.totalHR, 0);
        const cunTotal = cunStandings.reduce((sum, team) => sum + team.totalHR, 0);
        const felTotal = felStandings.reduce((sum, team) => sum + team.totalHR, 0);

        function renderTable(title, rows, totalValue) {
          return `
        <div style="margin-right:40px;">
          <h2>${title}</h2>
          <table style="border-collapse:collapse; min-width:280px;">
            <thead>
              <tr>
                <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Rank</th>
                <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Team</th>
                <th style="text-align:right; padding:8px 12px; border-bottom:2px solid #ccc;">HR</th>
              </tr>
            </thead>
            <tbody>
              ${rows.map((team, index) => `
                <tr>
                  <td style="padding:8px 12px; border-bottom:1px solid #eee;">${index + 1}</td>
                  <td style="padding:8px 12px; border-bottom:1px solid #eee;">
                    <button onclick="showTeam('${team.teamName}')" style="background:none; border:none; padding:0; margin:0; color:blue; cursor:pointer; font:inherit;">
                      ${team.teamName}
                    </button>
                  </td>
                  <td style="text-align:right; padding:8px 12px; border-bottom:1px solid #eee;">${team.totalHR}</td>
                </tr>
              `).join("")}
              <tr>
                <td colspan="2" style="padding:8px 12px; border-top:2px solid #000;"><strong>Total</strong></td>
                <td style="text-align:right; padding:8px 12px; border-top:2px solid #000;"><strong>${totalValue}</strong></td>
              </tr>
            </tbody>
          </table>
        </div>
      `;
        }

        display.innerHTML = `
      <div style="display:flex; gap:40px; align-items:flex-start; flex-wrap:wrap;">
        ${renderTable("Overall Standings", standings, overallTotal)}
        <div>
          ${renderTable("CUN Standings", cunStandings, cunTotal)}
          <div style="height:24px;"></div>
          ${renderTable("FEL Standings", felStandings, felTotal)}
        </div>
      </div>
    `;

        updateTimestamp();
      } catch (error) {
        display.innerHTML = "<h2>Standings</h2><p>Error loading standings: " + error.message + "</p>";
        console.error(error);
      }
    }

    function updateTimestamp() {
      const el = document.getElementById("lastUpdated");
      if (!el) return;

      const now = new Date().toLocaleTimeString("en-US", {
        timeZone: "America/New_York",
        hour: "numeric",
        minute: "2-digit"
      });

      el.innerText = `Last updated: ${now} ET`;
    }

    showStandings();
