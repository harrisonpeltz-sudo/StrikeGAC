        const idCache = {};

        async function lookupPlayerIdByName(name) {
            if (idCache[name]) return idCache[name];

            const url = `https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}`;
            const response = await fetch(url);
            const data = await response.json();

            const id = data.people?.[0]?.id ?? null;
            idCache[name] = id;
            return id;
        }

        async function getHR(player) {
            let playerId = player.id;

            if (!playerId) {
                playerId = await lookupPlayerIdByName(player.name);
            }

            if (!playerId) return null;

            const url = `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting`;
            const response = await fetch(url);
            const data = await response.json();

            return data.stats?.[0]?.splits?.[0]?.stat?.homeRuns ?? 0;
        }

        async function showLeagueTable() {
            const display = document.getElementById("leagueTableDisplay");
            display.innerHTML = "<h2>League Comparison</h2><p>Loading...</p>";

            const teamNames = Object.keys(teams);

            const teamResults = {};

            for (const teamName of teamNames) {
                const players = teams[teamName];

                const results = await Promise.all(
                    players.map(async (player) => {
                        const hr = await getHR(player);
                        return { ...player, hr };
                    })
                );

                teamResults[teamName] = results;
            }

            let html = `
        <h2>League Comparison</h2>
        <table style="border-collapse: collapse; font-size: 12px;">
          <thead>
            <tr>
              ${teamNames.map(team => `
                <th colspan="3" style="border-bottom:2px solid #000; padding:6px 10px;">
                  ${team}
                </th>
              `).join("")}
            </tr>
            <tr>
              ${teamNames.map(() => `
                <th>Pos</th>
                <th>Player</th>
                <th>HR</th>
              `).join("")}
            </tr>
          </thead>
          <tbody>
      `;

            for (let i = 0; i < 9; i++) {
                html += "<tr>";

                for (const team of teamNames) {
                    const p = teamResults[team][i];

                    html += `
            <td>${p.position}</td>
            <td>${p.name}</td>
            <td>${p.hr ?? "N/A"}</td>
          `;
                }

                html += "</tr>";
            }

            html += "<tr>";

            for (const team of teamNames) {
                const total = teamResults[team].reduce(
                    (sum, p) => sum + (typeof p.hr === "number" ? p.hr : 0),
                    0
                );

                html += `
          <td colspan="2"><strong>Total</strong></td>
          <td><strong>${total}</strong></td>
        `;
            }

            html += `
          </tr>
          </tbody>
        </table>
      `;

            display.innerHTML = html;
        }
