    const conferences = {
      cun: ["pat", "hend", "ston", "d", "zuck"],
      fel: ["Gib", "caleb", "har", "krev", "AI"]
    };

    const idCache = {};

    async function lookupPlayerIdByName(name) {
      if (idCache[name]) return idCache[name];

      const url = `https://statsapi.mlb.com/api/v1/people/search?names=${encodeURIComponent(name)}`;
      const response = await fetch(url);
      const data = await response.json();

      const id = data.people?.[0]?.id ?? null;
      idCache[name] = id;
      return id;
    }

    async function getHR(player) {
      let playerId = player.id;

      if (!playerId) {
        playerId = await lookupPlayerIdByName(player.name);
      }

      if (!playerId) return null;

      const url = `https://statsapi.mlb.com/api/v1/people/${playerId}/stats?stats=season&group=hitting`;
      const response = await fetch(url);
      const data = await response.json();

      return data.stats?.[0]?.splits?.[0]?.stat?.homeRuns ?? 0;
    }

    function getConference(teamName) {
      if (conferences.cun.includes(teamName)) return "CUN";
      if (conferences.fel.includes(teamName)) return "FEL";
      return "";
    }

    async function showLeaders() {
      const display = document.getElementById("leadersDisplay");
      display.innerHTML = "<h2>League Leaders</h2><p>Loading...</p>";

      const players = [];

      for (const [teamName, roster] of Object.entries(teams)) {
        for (const player of roster) {
          const hr = await getHR(player);

          players.push({
            name: player.name,
            position: player.position,
            hr: hr,
            team: teamName,
            conference: getConference(teamName)
          });
        }
      }

      players.sort((a, b) => {
        if ((b.hr ?? -1) !== (a.hr ?? -1)) return (b.hr ?? -1) - (a.hr ?? -1);
        return a.name.localeCompare(b.name);
      });

      let html = `
        <h2>League Leaders</h2>
        <table style="border-collapse: collapse; min-width: 700px;">
          <thead>
            <tr>
              <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">#</th>
              <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Player</th>
              <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Pos</th>
              <th style="text-align:right; padding:8px 12px; border-bottom:2px solid #ccc;">HR</th>
              <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Team</th>
              <th style="text-align:left; padding:8px 12px; border-bottom:2px solid #ccc;">Conference</th>
            </tr>
          </thead>
          <tbody>
      `;

      players.forEach((player, index) => {
        html += `
          <tr>
            <td style="padding:8px 12px; border-bottom:1px solid #eee;">${index + 1}</td>
            <td style="padding:8px 12px; border-bottom:1px solid #eee;">${player.name}</td>
            <td style="padding:8px 12px; border-bottom:1px solid #eee;">${player.position}</td>
            <td style="text-align:right; padding:8px 12px; border-bottom:1px solid #eee;">${player.hr ?? "N/A"}</td>
            <td style="padding:8px 12px; border-bottom:1px solid #eee;">${player.team}</td>
            <td style="padding:8px 12px; border-bottom:1px solid #eee;">${player.conference}</td>
          </tr>
        `;
      });

      html += `
          </tbody>
        </table>
      `;

      display.innerHTML = html;
    }

    showLeaders();
